<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Codex OpenAI Proxy</title>
  <script>
    (() => {
      const validThemes = new Set(["system", "light", "dark"]);
      let themeSource = "system";
      try {
        const savedTheme = localStorage.getItem("proxy-theme-source");
        if (validThemes.has(savedTheme)) themeSource = savedTheme;
      } catch {
        themeSource = "system";
      }
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.themeSource = themeSource;
      document.documentElement.dataset.theme = themeSource === "system"
        ? (prefersDark ? "dark" : "light")
        : themeSource;
    })();
  </script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="shell">
    <section class="topline">
      <div>
        <h1>Codex OpenAI Proxy</h1>
        <div class="sub">把本机 Codex 登录态变成 OpenAI 兼容接口。</div>
      </div>
      <div class="pill"><span id="dot" class="dot"></span><span id="stateText">读取中</span></div>
    </section>

    <section class="grid">
      <div class="panel control">
        <div class="switch-row">
          <div>
            <div class="label-title">代理服务</div>
            <div class="label-note" id="switchNote">打开后显示可用 Base URL。</div>
          </div>
          <label class="switch" aria-label="代理服务开关">
            <input id="enabledSwitch" type="checkbox" />
            <span class="track"><span class="thumb"></span></span>
          </label>
        </div>

        <div class="status-list">
          <div class="status-line"><span>Codex 登录态</span><strong id="authState">-</strong></div>
        </div>

        <div class="settings-form">
          <section class="models-field" aria-labelledby="modelsLabel">
            <div id="modelsLabel" class="field-label">支持的模型</div>
            <ul id="modelsList" class="model-list"></ul>
          </section>
          <label class="field">
            <span>代理端口</span>
            <input id="portInput" class="text-input" type="number" min="1024" max="65535" step="1" inputmode="numeric" />
          </label>
          <section class="appearance-field" aria-labelledby="appearanceLabel">
            <div id="appearanceLabel" class="field-label">外观</div>
            <div class="segmented-control" role="group" aria-label="外观模式">
              <button class="theme-option" type="button" data-theme-option="system" aria-pressed="true">跟随系统</button>
              <button class="theme-option" type="button" data-theme-option="light" aria-pressed="false">亮色</button>
              <button class="theme-option" type="button" data-theme-option="dark" aria-pressed="false">暗色</button>
            </div>
          </section>
          <button id="saveSettingsBtn" class="btn" type="button" disabled>保存配置</button>
        </div>

        <div class="actions">
          <button id="refreshBtn" class="btn" type="button">刷新</button>
          <button id="testBtn" class="btn primary" type="button">测试请求</button>
        </div>
        <div id="message" class="message"></div>
      </div>

      <div class="panel urls">
        <div id="baseRow" class="url-row dim">
          <div>
            <div class="url-label">OpenAI Base URL</div>
            <div id="baseUrl" class="url-value">-</div>
          </div>
          <button id="copyBase" class="btn" type="button">复制</button>
        </div>
        <div id="chatRow" class="url-row dim">
          <div>
            <div class="url-label">Chat Completions URL</div>
            <div id="chatUrl" class="url-value">-</div>
          </div>
          <button id="copyChat" class="btn" type="button">复制</button>
        </div>
        <div class="url-row">
          <div>
            <div class="url-label">API Key</div>
            <div class="url-value">dummy</div>
          </div>
          <button id="copyKey" class="btn" type="button">复制</button>
        </div>
      </div>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
