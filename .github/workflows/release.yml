name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS installer
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Build release assets
        run: npm run dist -- --x64 --arm64 --publish never

      - name: Extract app.asar for hot update
        run: |
          ASAR_SOURCE=$(find dist -name "app.asar" -path "*/Resources/*" | head -1)
          if [ -z "$ASAR_SOURCE" ]; then
            echo "app.asar not found"
            exit 1
          fi
          cp "$ASAR_SOURCE" dist/app.asar

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
            dist/app.asar
          if-no-files-found: error
          retention-days: 5

  windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Build release assets
        run: npx electron-builder --win nsis zip --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-windows
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error
          retention-days: 5

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [macos, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: ls -lhR artifacts

      - name: Write release notes
        run: echo "Release ${GITHUB_REF_NAME}" > release_notes.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: false
          body_path: release_notes.txt
          overwrite_files: true
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.blockmap
            artifacts/latest*.yml
            artifacts/app.asar
